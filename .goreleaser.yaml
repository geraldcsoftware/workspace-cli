version: 2

project_name: space

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: space
    main: ./cmd/space
    binary: space
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: "{{ .Env.GITHUB_REPOSITORY_OWNER }}"
    name: workspace-cli

brews:
  - name: space
    homepage: "https://github.com/{{ .Env.GITHUB_REPOSITORY_OWNER }}/workspace-cli"
    description: "Multi-repo workspace manager for git worktrees"
    license: "MIT"
    repository:
      owner: "{{ .Env.HOMEBREW_TAP_OWNER }}"
      name: "{{ .Env.HOMEBREW_TAP_REPO }}"
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
    test: |
      system "#{bin}/space", "help"

